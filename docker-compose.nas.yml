# DomainHunter NAS-safe compose file.
# Postgres is intentionally not published to the host; only the app port is exposed.

services:
  postgres:
    image: postgres:16-alpine
    container_name: domainhunter-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-domainhunter}
      POSTGRES_USER: ${POSTGRES_USER:-domainhunter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: domainhunter:latest
    container_name: domainhunter-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-domainhunter}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-domainhunter}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:8832}
      PORT: 3000
      HOST: 0.0.0.0
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      SEMRUSH_API_KEY: ${SEMRUSH_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "${APP_PORT:-8832}:3000"

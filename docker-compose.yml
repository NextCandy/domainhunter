# DomainHunter — Synology DS923+ deployment
# Usage:
#   1. cp .env.example .env  &&  edit values
#   2. docker compose up -d
#   3. open http://<NAS_LAN_IP>:3000  (first signup = admin)

services:
  postgres:
    image: postgres:16-alpine
    container_name: dh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-domainhunter}
      POSTGRES_USER: ${POSTGRES_USER:-domainhunter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    # Bind to loopback only — exposing 5432 publicly is dangerous.
    # Comment out if you need DB access from your LAN.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: domainhunter:latest
    container_name: dh-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-domainhunter}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-domainhunter}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (>=32 chars)}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      PORT: 3000
      HOST: 0.0.0.0
      # AI (OpenAI-compatible — works with OpenAI, DeepSeek, Ollama, etc.)
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY:  ${AI_API_KEY:-}
      AI_MODEL:    ${AI_MODEL:-gpt-4o-mini}
      # Optional integrations
      SEMRUSH_API_KEY:    ${SEMRUSH_API_KEY:-}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "${APP_PORT:-3000}:3000"
